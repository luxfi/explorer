version: '3.8'

networks:
  hanzo-network:
    external: true

services:
  # LUX Node - The blockchain node that provides RPC endpoint
  luxnode:
    image: luxfi/node:latest
    container_name: 'luxnet-node'
    restart: always
    networks:
      - hanzo-network
    ports:
      - "9650:9650"  # RPC endpoint - api.lux.network will proxy to this
    volumes:
      - /home/z/.luxd:/root/.luxd  # Use existing blockchain data
    command: |
      /luxd
      --network-id=96369
      --sybil-protection-enabled=false
      --http-host=0.0.0.0
      --http-port=9650
      --staking-enabled=false
      --health-check-frequency=5s
      --api-admin-enabled=false
      --index-enabled=true
      --log-level=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9650/ext/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Blockscout Backend - Explorer API
  backend:
    image: ghcr.io/blockscout/blockscout:${DOCKER_TAG:-latest}
    container_name: 'luxnet-backend'
    restart: always
    stop_grace_period: 5m
    command: "bin/blockscout start"
    depends_on:
      - luxnode
    networks:
      - hanzo-network
    ports:
      - "4000:4000"  # Blockscout API - api-explore.lux.network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./docker-compose/envs/common-blockscout.env
    environment:
      # Use host PostgreSQL with existing data
      DATABASE_URL: postgresql://lux:lux@host.docker.internal:5432/explorer_luxnet?sslmode=disable
      # Use host Redis
      CACHE_REDIS_URL: redis://host.docker.internal:6379
      CACHE_REDIS_DB: 0
      # Chain configuration - point to our node
      ETHEREUM_JSONRPC_HTTP_URL: http://luxnode:9650/ext/bc/C/rpc
      ETHEREUM_JSONRPC_TRACE_URL: http://luxnode:9650/ext/bc/C/rpc
      ETHEREUM_JSONRPC_WS_URL: ws://luxnode:9650/ext/bc/C/ws
      CHAIN_ID: '96369'
      # Don't recreate tables if they exist
      DISABLE_MIGRATE: 'false'
      ECTO_USE_SSL: 'false'
      MIX_ENV: 'prod'
      # Branding
      LOGO: '/icons/lux-logo.svg'
      LOGO_FOOTER: '/icons/lux-logo.svg'
      COIN: 'LUX'
      COIN_NAME: 'LUX'
      NETWORK: 'LUX Network'
      SUBNETWORK: 'LUX Mainnet'
      # Technical settings
      ETHEREUM_JSONRPC_VARIANT: 'geth'
      HEART_BEAT_TIMEOUT: '30'
      BLOCK_TRANSFORMER: 'base'
      DISABLE_REALTIME_INDEXER: 'false'
      DISABLE_CATCHUP_INDEXER: 'false'
      POOL_SIZE: '50'
      POOL_SIZE_API: '10'
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: 'true'
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: 'false'
      # CORS settings
      API_V2_ENABLED: 'true'
      DISABLE_CORS: 'false'
      # Public access
      BLOCKSCOUT_HOST: 'api-explore.lux.network'
      BLOCKSCOUT_PROTOCOL: 'https'
      SECRET_KEY_BASE: 'RMgI4C1HSkxsEjdhtGMfwAHfyT6CKWXOgzCboJflfSm4jeAlic52io0KkfxfTsFC'
      CHECK_ORIGIN: 'false'

  # Frontend - Explorer UI
  frontend:
    image: ghcr.io/blockscout/frontend:${FRONTEND_TAG:-latest}
    container_name: 'luxnet-frontend'
    restart: always
    networks:
      - hanzo-network
    ports:
      - "3000:3000"  # Explorer UI - explore.lux.network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./docker-compose/envs/common-frontend.env
    environment:
      NEXT_PUBLIC_API_HOST: 'api-explore.lux.network'
      NEXT_PUBLIC_API_PROTOCOL: 'https'
      NEXT_PUBLIC_STATS_API_HOST: 'https://stats.lux.network'
      NEXT_PUBLIC_NETWORK_NAME: 'LUX Network'
      NEXT_PUBLIC_NETWORK_SHORT_NAME: 'LUX'
      NEXT_PUBLIC_NETWORK_ID: '96369'
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: 'LUX'
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: 'LUX'
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: '18'
      NEXT_PUBLIC_NETWORK_RPC_URL: 'https://api.lux.network'

  # Stats Service
  stats:
    image: ghcr.io/blockscout/stats:${STATS_TAG:-latest}
    container_name: 'luxnet-stats'
    restart: always
    networks:
      - hanzo-network
    ports:
      - "8050:8050"  # Stats API - stats.lux.network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./docker-compose/envs/common-stats.env
    environment:
      # Use host PostgreSQL with existing data
      STATS__DB_URL: postgresql://lux:lux@host.docker.internal:5432/stats_luxnet?sslmode=disable
      STATS__BLOCKSCOUT_DB_URL: postgresql://lux:lux@host.docker.internal:5432/explorer_luxnet?sslmode=disable
      STATS__CREATE_DATABASE: 'false'  # Don't recreate, use existing
      STATS__RUN_MIGRATIONS: 'true'

  # Visualizer Service
  visualizer:
    image: ghcr.io/blockscout/visualizer:${VISUALIZER_TAG:-latest}
    container_name: 'luxnet-visualizer'
    restart: always
    networks:
      - hanzo-network
    ports:
      - "8052:8050"  # Visualizer - viz.lux.network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./docker-compose/envs/common-visualizer.env
    environment:
      VISUALIZER__SERVER__HTTP__ENABLED: 'true'
      VISUALIZER__SERVER__HTTP__ADDR: '0.0.0.0:8050'
      VISUALIZER__SERVER__GRPC__ENABLED: 'false'

  # Signature Provider Service
  sig-provider:
    image: ghcr.io/blockscout/sig-provider:${SIG_PROVIDER_TAG:-latest}
    container_name: 'luxnet-sig-provider'
    restart: always
    networks:
      - hanzo-network
    ports:
      - "8051:8050"  # Sig Provider - sig.lux.network
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Summary of stable ports:
# 9650 - LUX Node RPC (api.lux.network, rpc.lux.network)
# 4000 - Blockscout API (api-explore.lux.network)
# 3000 - Explorer Frontend (explore.lux.network)
# 8050 - Stats Service (stats.lux.network)
# 8051 - Signature Provider (sig.lux.network)
# 8052 - Visualizer (viz.lux.network)