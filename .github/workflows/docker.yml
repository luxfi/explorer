name: Docker
on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write

# Multi-arch on luxfi org's native amd64 ARC runner pool; arm64 via QEMU
# (matches lux/graph + lux/indexer docker.yml). Mac devs run native arm64
# under OrbStack — zero Rosetta is allowed. Semver tags only.
jobs:
  docker:
    runs-on: lux-build-linux-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64
      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: network=host
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/luxfi/explorer
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=explorer
          cache-to: type=gha,scope=explorer,mode=max
          provenance: false
          push: true
