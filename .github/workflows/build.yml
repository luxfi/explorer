name: Build Explorer

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  repository_dispatch:
    types: [indexer-updated, graph-updated, explore-updated]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/luxfi/explorer

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: lux-build-amd64
            platform: linux/amd64
          - runner: lux-build-arm64
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=sha
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            INDEXER_REF=main
            GRAPH_REF=main
            EXPLORE_REF=main

  manifest:
    needs: build
    runs-on: lux-build-amd64
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=sha
      - name: Create multi-arch manifest
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            docker manifest create "$tag" \
              --amend "$tag" \
              --amend "$tag" || true
            docker manifest push "$tag" || true
          done
