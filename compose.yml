services:
  explorer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
    image: ghcr.io/luxfi/explorer:dev
    ports:
      - "8090:8090"
    volumes:
      - explorer-data:/data
      - ./chains.example.yaml:/etc/explorer/chains.yaml:ro
    environment:
      DATA_DIR: /data
      HTTP_ADDR: :8090
      EXPLORER_CONFIG: /etc/explorer/chains.yaml
    restart: unless-stopped

volumes:
  explorer-data:
